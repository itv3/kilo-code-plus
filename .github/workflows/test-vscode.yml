# kilocode_change - new file
name: test-vscode

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: detect VS Code changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      vscode: ${{ steps.filter.outputs.vscode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect VS Code changes
        id: filter
        uses: Kilo-Org/paths-filter@668c092af3649c4b664c54e4b704aa46782f6f7c # v3
        with:
          predicate-quantifier: every
          filters: |
            vscode:
              - '**'
              - '!packages/kilo-jetbrains/**'
              - '!packages/kilo-docs/**'
              - '!docs/**'

  unit:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.vscode == 'true'
    name: unit tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run unit tests
        working-directory: packages/kilo-vscode
        run: bun run test:unit

      - name: Check lint (ESLint)
        working-directory: packages/kilo-vscode
        run: bun run lint

      - name: Check formatting (prettier)
        working-directory: packages/kilo-vscode
        run: bun run format:check

      - name: Check for dead code (knip)
        working-directory: packages/kilo-vscode
        run: bun run knip

      - name: Check for kilocode_change markers
        working-directory: packages/kilo-vscode
        run: bun run check-kilocode-change
